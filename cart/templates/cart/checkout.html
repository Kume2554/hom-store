<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ชำระเงิน - My Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">MY SHOP</a>
        <div class="d-flex align-items-center">
            {% if user.is_authenticated %}
                <span class="text-white me-3 small">ยินดีต้อนรับ, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">ออกจากระบบ</a>
            {% else %}
                <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">เข้าสู่ระบบ</a>
                <a href="{% url 'register' %}" class="btn btn-warning btn-sm">สมัครสมาชิก</a>
            {% endif %}
            <a href="{% url 'cart_summary' %}" class="btn btn-light btn-sm ms-3 fw-bold">
                🛒 ตะกร้า (<span id="cart-qty">{{ cart|length }}</span>)
            </a>
        </div>
    </div>
</nav>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 p-4">
                <h2 class="fw-bold mb-4 text-center">📝 ข้อมูลจัดส่งและชำระเงิน</h2>
                
                <form method="POST" action="">
                    {% csrf_token %}
                    
                    <h5 class="fw-bold text-primary mb-3">1. ที่อยู่สำหรับจัดส่ง</h5>
                    
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">ชื่อ</label>
                            <input type="text" name="first_name" class="form-control" placeholder="ชื่อจริง" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">นามสกุล</label>
                            <input type="text" name="last_name" class="form-control" placeholder="นามสกุล" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">เบอร์โทรศัพท์ <span class="text-danger">*</span></label>
                        <input type="tel" name="phone" class="form-control" placeholder="เช่น 0812345678" pattern="[0-9]{10}" required>
                        <div class="form-text">กรุณากรอกตัวเลข 10 หลักติดกัน</div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">ที่อยู่จัดส่งแบบละเอียด</label>
                        <textarea name="address" class="form-control" rows="3" placeholder="บ้านเลขที่, หมู่, ซอย, ถนน, ตำบล/แขวง, อำเภอ/เขต..." required></textarea>
                    </div>

                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label fw-bold">จังหวัด</label>
                            <input type="text" name="province" class="form-control" placeholder="เช่น กรุงเทพมหานคร" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold">รหัสไปรษณีย์</label>
                            <input type="text" name="zipcode" class="form-control" placeholder="เช่น 10110" required>
                        </div>
                    </div>

                    <hr class="my-4">

                    <h5 class="fw-bold text-primary mb-3">2. วิธีการชำระเงิน</h5>
                    <div class="mb-4">
                        <select name="payment_method" class="form-select form-select-lg" required>
                            <option value="" disabled selected>-- กรุณาเลือกวิธีการชำระเงิน --</option>
                            <option value="promptpay">📱 โอนเงินผ่านบัญชีธนาคาร / PromptPay</option>
                            <option value="cod">🚚 เก็บเงินปลายทาง (Cash on Delivery)</option>
                            <option value="credit_card">💳 บัตรเครดิต / บัตรเดบิต</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-success w-100 fw-bold py-3 fs-5 mt-2">
                        ยืนยันคำสั่งซื้อ
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
