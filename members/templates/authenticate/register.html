<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card shadow-sm p-4 border-0">
            <h2 class="text-center fw-bold mb-4">📝 สมัครสมาชิก</h2>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100 fw-bold">ยืนยันการสมัคร</button>
            </form>
            <p class="text-center mt-3">เป็นสมาชิกอยู่แล้ว? <a href="{% url 'login' %}">เข้าสู่ระบบ</a></p>
        </div>
    </div>
</div>
</body>
