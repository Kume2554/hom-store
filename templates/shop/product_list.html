<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hom Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">HOM STORE</a>
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <span class="nav-link text-white">สวัสดี, {{ user.username }}</span>
                    <a class="nav-link" href="{% url 'logout' %}">ออกจากระบบ</a>
                {% else %}
                    <a class="nav-link" href="{% url 'login' %}">เข้าสู่ระบบ</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            {% for p in products %}
            <div class="col-md-3 mb-4">
                <div class="card h-100 shadow-sm border-0">
                    {% if p.image %}
                        <img src="{{ p.image.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    {% endif %}
                    <div class="card-body text-center">
                        <h5 class="card-title">{{ p.name }}</h5>
                        <p class="text-primary fw-bold">{{ p.price }} บาท</p>
                        
                        {% if user.is_authenticated %}
                            <a href="{% url 'cart_add' p.id %}" class="btn btn-success w-100">เพิ่มลงตะกร้า</a>
                        {% else %}
                            <button type="button" class="btn btn-primary w-100" onclick="showLoginAlert()">เพิ่มลงตะกร้า</button>
                        {% endif %}
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
    function showLoginAlert() {
        Swal.fire({
            title: 'หยุดก่อนครับ!',
            text: 'คุณต้องเข้าสู่ระบบก่อนถึงจะซื้อสินค้าได้นะ',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonText: 'ไปหน้า Login',
            cancelButtonText: 'ดูต่อเฉยๆ'
        }).then((result) => {
            if (result.isConfirmed) {
                window.location.href = "{% url 'login' %}";
            }
        })
    }
    </script>
</body>
</html>
